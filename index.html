<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
  <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sibusiso Elite Photography</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f4f4f4;
        }
        header {
            background: #222;
            color: white;
            padding: 15px;
            text-align: center;
        }
        nav {
            background: #444;
            padding: 10px;
            text-align: center;
        }
        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
        }
        section {
            padding: 20px;
        }
        footer {
            background: #222;
            color: white;
            text-align: center;
            padding: 10px;
        }
        form input, form textarea {
            width: 100%;
            margin: 10px 0;
            padding: 8px;
        }
        button {
            background: #222;
            color: white;
            padding: 10px 15px;
            border: none;
        }
    </style>
</head>
<body>

<header>
    <h1>Sibusiso Elite Photography</h1>
    <p>Capturing Moments That Last Forever</p>
</header>

<nav>
    <a href="#about">About</a>
    <a href="#contact">Contact</a>
</nav>

<section id="about">
    <h2>About Us</h2>
    <p>We specialize in weddings, portraits, and event photography. Our goal is to capture your most precious moments.</p>
</section>



<section id="contact">
    <h2>Contact Us</h2>
    <form action="contact" method="post">
        <input type="text" name="name" placeholder="Your Name" required>
        <input type="email" name="email" placeholder="Your Email" required>
        <textarea name="message" placeholder="Your Message"></textarea>
        <button type="submit">Send</button>
    </form>
</section>

<footer>
    <p>&copy; 2026  Photography</p>
</footer>

</body>
</html>
